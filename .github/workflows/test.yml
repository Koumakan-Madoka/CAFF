name: test
on:
  push:
  pull_request:
jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      CAFF_REQUIRE_SPAWN: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

