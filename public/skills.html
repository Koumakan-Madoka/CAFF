<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAFF Skill Manager</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/shared/api-client.js"></script>
    <script defer src="/shared/toast.js"></script>
    <script defer src="/skills.js"></script>
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">CAFF Skill Manager</p>
          <h1>Skill 管理中心</h1>
          <p class="subtitle">管理 `.pi-sandbox/skills` 下的真实 skill 文件夹，供人格和会话按引用复用。</p>
        </div>
        <div class="topbar-actions">
          <nav class="topbar-nav" aria-label="Primary">
            <a class="topbar-link" href="/">聊天工作台</a>
            <a class="topbar-link" href="/personas.html">人格管理</a>
            <a class="topbar-link active" href="/skills.html">Skill 管理</a>
            <a class="topbar-link" href="/projects.html">项目管理</a>
            <a class="topbar-link" href="/metrics.html">评测报表</a>
            <a class="topbar-link" href="/eval-cases.html">错题本</a>
          </nav>
          <button id="refresh-button" class="ghost-button" type="button">刷新</button>
        </div>
      </header>

      <main class="layout persona-layout">
        <aside class="panel panel-conversations">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Skill List</p>
              <h2>Skill 仓库</h2>
            </div>
            <button id="new-skill-button" type="button">新建 Skill</button>
          </div>
          <div id="skill-list" class="agent-list"></div>
        </aside>

        <section class="panel panel-studio">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Editor</p>
              <h2 id="editor-title">编辑 Skill</h2>
            </div>
          </div>

          <form id="skill-form" class="settings-form">
            <input id="skill-id" name="id" type="hidden" />

            <label>
              <span>Skill 名称</span>
              <input id="skill-name" name="name" type="text" maxlength="80" placeholder="例如：前端重构规范" />
            </label>

            <label>
              <span>Skill 说明</span>
              <input id="skill-description" name="description" type="text" maxlength="240" placeholder="描述这个 skill 何时触发、擅长处理什么任务" />
            </label>

            <label>
              <span>Skill 文件夹</span>
              <input id="skill-folder-path" type="text" readonly placeholder=".pi-sandbox/skills/<skill-id>" />
            </label>

            <label>
              <span>`SKILL.md` 正文</span>
              <textarea
                id="skill-body"
                name="body"
                rows="14"
                maxlength="20000"
                placeholder="填写 skill 的核心说明、工作流、何时读取 references/ 或 scripts/ 等"
              ></textarea>
            </label>

            <label>
              <span>`agents/openai.yaml` 可选内容</span>
              <textarea
                id="skill-openai-yaml"
                name="openaiYaml"
                rows="10"
                maxlength="12000"
                placeholder="可选。如果需要 UI metadata，可以在这里维护 agents/openai.yaml"
              ></textarea>
            </label>

            <section class="stack-card">
              <div class="section-row">
                <span class="section-label">当前目录文件</span>
                <span class="section-hint">上面管理核心文件，这里展示整个 skill 文件夹的当前内容</span>
              </div>
              <div id="skill-file-list" class="tag-row"></div>
            </section>

            <section class="stack-card">
              <div class="section-row">
                <div>
                  <span class="section-label">额外文件</span>
                  <span class="section-hint">直接管理 `references/`、`scripts/`、`assets/` 等文本文件，`SKILL.md` 和 `agents/openai.yaml` 仍在上方编辑。</span>
                </div>
                <button id="new-skill-file-button" class="ghost-button" type="button">新建文件草稿</button>
              </div>

              <div class="skill-file-workspace">
                <div id="skill-extra-file-list" class="skill-file-browser"></div>

                <div class="skill-file-editor">
                  <label>
                    <span>文件路径</span>
                    <input id="skill-extra-file-path" type="text" maxlength="240" placeholder="例如：references/guide.md 或 scripts/build.js" />
                  </label>

                  <label>
                    <span>文件内容</span>
                    <textarea
                      id="skill-extra-file-content"
                      rows="14"
                      maxlength="40000"
                      placeholder="这里直接编辑 skill 文件夹里的额外文本文件内容"
                    ></textarea>
                  </label>

                  <div class="button-row">
                    <button id="save-skill-file-button" type="button">保存文件</button>
                    <button id="delete-skill-file-button" class="ghost-button danger" type="button">删除文件</button>
                  </div>
                </div>
              </div>
            </section>

            <div class="button-row">
              <button id="save-skill-button" type="submit">保存 Skill</button>
              <button id="delete-skill-button" class="ghost-button danger" type="button">删除 Skill</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>
  </body>
</html>
